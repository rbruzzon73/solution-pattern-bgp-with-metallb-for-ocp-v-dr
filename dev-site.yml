runtime:
  cache_dir: ./.cache/antora

site:
  title: BGP LB infrastructure with MetalLB for OpenShift Virtualization in DR
  url: http://localhost:3000/
  start_page: solution-pattern-bgp-with-metallb-for-ocp-v-dr::index.adoc

content:
  sources:
    - url: .
      branches: HEAD
      start_path: documentation
asciidoc:
  attributes:
    title: BGP LB infrastructure with MetalLB for OpenShift Virtualization in DR
  extensions:
    - ./lib/remote-include-processor.js
    - ./lib/tab-block.js
ui:
  bundle:
    url: https://github.com/redhat-solution-patterns/course-ui/releases/download/v0.1.16/ui-bundle.zip
    snapshot: true
  supplemental_files: ./supplemental-ui
output:
  dir: ./gh-pages
